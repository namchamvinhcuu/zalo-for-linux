name: Build Zalo for Linux

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      zalo_version:
        description: 'Zalo Version (leave empty for latest)'
        required: false
        default: ''
        type: string
      zadark_version:
        description: 'ZaDark Version/Tag/Commit (leave empty for latest)'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        
    - name: Cache Electron binaries
      uses: actions/cache@v3
      with:
        path: ~/.cache/electron
        key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-electron-
          
    - name: Install Node.js dependencies
      run: npm ci --prefer-offline --no-audit

    - name: Install system build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y liblzma-dev

    - name: Setup and Build
      id: build
      env:
        ZALO_VERSION: ${{ github.event.inputs.zalo_version }}
        ZADARK_VERSION: ${{ github.event.inputs.zadark_version }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: npm run main
        
    - name: Upload Original AppImage artifact
      if: steps.build.outputs.build == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.build.outputs.original_appimage_name }}
        path: ${{ steps.build.outputs.original_appimage_file }}
        retention-days: 30
        
    - name: Upload ZaDark AppImage artifact
      if: steps.build.outputs.build == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.build.outputs.zadark_appimage_name }}
        path: ${{ steps.build.outputs.zadark_appimage_file }}
        retention-days: 30
        
    - name: Create Release
      if: steps.build.outputs.build == 'true'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.build.outputs.zalo_version }}
        name: ${{ steps.build.outputs.zalo_version }}
        body: |
          ## 🚀 How to use
          
          It is recommended to use [Gear Lever](https://github.com/mijorus/gearlever) to manage and integrate the AppImage.

          ```bash
          # Download the AppImage
          wget https://github.com/${{ github.repository }}/releases/download/${{ steps.build.outputs.zalo_version }}/${{ steps.build.outputs.zadark_appimage_name }}

          # Install with Gear Lever
          flatpak run it.mijorus.gearlever --integrate ${{ steps.build.outputs.zadark_appimage_name }}
          ```

          ## 📋 System Requirements
          - Linux x64
          - GLIBC 2.28 or later
          
          ## 🐛 Issues & Support
          Please report issues in the [GitHub Issues](https://github.com/${{ github.repository }}/issues) section.

        files: |
          ${{ steps.build.outputs.original_appimage_file }}
          ${{ steps.build.outputs.zadark_appimage_file }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Cleanup old release assets
      if: steps.build.outputs.build == 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        RELEASE_TAG: ${{ steps.build.outputs.zalo_version }}
        CURRENT_COMMIT: ${{ env.COMMIT_HASH }}
      run: |
        set -euo pipefail

        echo "Cleaning up assets for release $RELEASE_TAG (keeping commit $CURRENT_COMMIT)"

        asset_names=$(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name' || true)

        if [ -z "$asset_names" ]; then
          echo "No assets found for release $RELEASE_TAG"
          exit 0
        fi

        for name in $asset_names; do
          if [[ "$name" == Zalo-*.AppImage ]] && [[ "$name" != *"$CURRENT_COMMIT"* ]]; then
            echo "Removing old asset: $name"
            gh release delete-asset "$RELEASE_TAG" "$name" --yes
          fi
        done
